<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Echoing Dark v2.1</title>
    <!-- 強制不快取設定 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; touch-action: none; }
        #arrow-container { width: 50px; height: 60px; position: relative; }
        #arrow { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 45px solid #ddd; position: absolute; left: 50%; top: 5px; transform: translateX(-50%); }
        #game-container { position: relative; width: 350px; height: 350px; border: 4px solid #1a1a1a; overflow: hidden; background: #333; }
        canvas { display: block; background: #000; width: 350px; height: 350px; }
        #story-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 500; cursor: pointer; text-align: center; }
        #warning-overlay { position: absolute; inset: 0; background: rgba(200,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 400; font-size: 40px; color: #f00; font-weight: bold; animation: blink 0.3s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .shake { animation: shakeAnim 0.1s infinite; }
        @keyframes shakeAnim { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(3px, -3px); } }
        #joystick-zone { width: 140px; height: 140px; background: rgba(255,255,255,0.05); border: 2px solid #333; border-radius: 50%; margin-top: 20px; position: relative; }
        #joystick-knob { width: 50px; height: 50px; background: #666; border-radius: 50%; position: absolute; top: 45px; left: 45px; pointer-events: none; }
        #overlay, #end-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .btn { background: #222; color: #fff; border: 1px solid #666; padding: 15px 40px; font-size: 18px; cursor: pointer; margin: 10px; min-width: 180px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="arrow-container"><div id="arrow"></div></div>
<div id="game-container">
    <div id="story-overlay"><div id="story-text" style="color:white; font-size:20px; font-weight:bold; margin-bottom:20px;"></div><div style="color:#aaa;">TAP TO PROCEED</div></div>
    <div id="warning-overlay">WARNING</div>
    <canvas id="gameCanvas" width="350" height="350"></canvas>
</div>
<div id="joystick-zone"><div id="joystick-knob"></div></div>

<div id="overlay">
    <h1 style="letter-spacing: 5px; color: #800;">THE ECHOING DARK</h1>
    <button class="btn" onclick="initEngine('normal')">NORMAL</button>
    <button class="btn" onclick="initEngine('hard')" style="color:#f00;">HARD</button>
</div>

<div id="end-screen" style="display:none;">
    <div id="end-msg" style="margin-bottom:30px; color: #f00; font-size: 20px;"></div>
    <button class="btn" onclick="location.reload()">RESTART</button>
</div>

<script>
/** 核心對象與狀態 **/
const WORLD_SIZE = 100, GRID_RES = 35;
let map = [], player = {x:50, y:50, vx:0, vy:0}, greyDot = {x:0,y:0}, redDot = {x:0,y:0};
let enemies = [], gameState = 'FIND_GREY', difficulty = 'normal', isPaused = true, redFollowing = false, isGameOver = false;
let audioCtx, mainGain, noteIndex = 0;
const notes = [220.0, 233.1, 261.6, 311.1, 349.2, 415.3];

const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
const arrow = document.getElementById('arrow');

/** 1. 強制初始化引擎 (核心修復) **/
function initEngine(mode) {
    difficulty = mode;
    document.getElementById('overlay').style.display = 'none';
    
    // 初始化音頻
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        mainGain = audioCtx.createGain(); mainGain.connect(audioCtx.destination);
        mainGain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        playStep();
    }
    
    // 初始化地圖
    map = [];
    for(let y=0; y<WORLD_SIZE; y++) {
        map[y] = [];
        for(let x=0; x<WORLD_SIZE; x++) map[y][x] = (x===0||y===0||x===99||y===99||Math.random()<0.28)?1:0;
    }
    
    // 初始化點位
    player = {x:50.5, y:50.5, vx:0, vy:0};
    const clr = (cx,cy) => {
        let ix=Math.floor(cx), iy=Math.floor(cy);
        for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) if(map[iy+i]) map[iy+i][ix+j]=0;
    };
    clr(50.5, 50.5);
    do { greyDot.x = 10+Math.random()*80; greyDot.y = 10+Math.random()*80; } 
    while(Math.sqrt((greyDot.x-50.5)**2+(greyDot.y-50.5)**2)<20 || map[Math.floor(greyDot.y)][Math.floor(greyDot.x)]===1);
    clr(greyDot.x, greyDot.y);

    isPaused = false;
    update();
}

/** 2. 聲音節奏 **/
function playStep() {
    if(isGameOver) return;
    let bpm = 1200;
    if(enemies.length > 0 && !isPaused) {
        let minD = 100;
        enemies.forEach(e => { let d=Math.sqrt((e.x-player.x)**2+(e.y-player.y)**2); if(d<minD) minD=d; });
        bpm = Math.max(150, Math.min(1200, (minD-2)*65+150));
    }
    if(!isPaused && audioCtx) {
        const o=audioCtx.createOscillator(), g=audioCtx.createGain();
        o.type='triangle'; o.frequency.value=notes[noteIndex%6]*(redFollowing?0.4:1);
        g.gain.setValueAtTime(0, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime+0.1);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.4);
        o.connect(g).connect(mainGain); o.start(); o.stop(audioCtx.currentTime+0.5);
        noteIndex++;
    }
    setTimeout(playStep, bpm);
}

/** 3. 遊戲循環 **/
function update() {
    if(isGameOver) return;

    if(!isPaused) {
        const base = 0.04, pSpd = redFollowing ? base*0.9 : base;
        let nX = player.x + player.vx*pSpd, nY = player.y + player.vy*pSpd;
        if(map[Math.floor(player.y)][Math.floor(nX+(player.vx>0?0.2:-0.2))]===0) player.x=nX;
        if(map[Math.floor(nY+(player.vy>0?0.2:-0.2))][Math.floor(player.x)]===0) player.y=nY;

        enemies.forEach(e => {
            let dx=player.x-e.x, dy=player.y-e.y, d=Math.sqrt(dx*dx+dy*dy);
            if(d<0.45) endMe('You evil kidnapper!');
            let evx=(dx/d)*pSpd, evy=(dy/d)*pSpd;
            if(map[Math.floor(e.y)][Math.floor(e.x+(evx>0?0.1:-0.1))]===0) e.x+=evx;
            if(map[Math.floor(e.y+(evy>0?0.1:-0.1))][Math.floor(e.x)]===0) e.y+=evy;
        });

        let target = (gameState==='FIND_GREY'||gameState==='RETURN_GREY')?greyDot:redDot;
        let tdx=target.x-player.x, tdy=target.y-player.y, td=Math.sqrt(tdx*tdx+tdy*tdy);
        let b = Math.min(220, Math.max(0, (td-5)*(220/45)));
        arrow.style.transform = `translateX(-50%) rotate(${Math.atan2(tdy,tdx)+Math.PI/2}rad)`;
        arrow.style.borderBottomColor = `rgb(${b},${b},${b})`;

        if(td < 0.6) {
            if(gameState==='FIND_GREY') {
                gameState='FIND_RED';
                isPaused=true;
                const ov=document.getElementById('story-overlay');
                document.getElementById('story-text').innerText="Bring Me the Red Dot";
                ov.style.display='flex';
                ov.onclick=()=>{ 
                    ov.style.display='none'; 
                    do { redDot.x=10+Math.random()*80; redDot.y=10+Math.random()*80; } 
                    while(Math.sqrt((redDot.x-player.x)**2+(redDot.y-player.y)**2)<30||map[Math.floor(redDot.y)][Math.floor(redDot.x)]===1);
                    isPaused=false;
                };
            } else if(gameState==='FIND_RED' && !redFollowing) {
                gameState='RETURN_GREY'; redFollowing=true;
                isPaused=true;
                const ov=document.getElementById('story-overlay');
                document.getElementById('story-text').innerText="No…no…please no";
                ov.style.display='flex';
                ov.onclick=()=>{
                    ov.style.display='none';
                    const gc=document.getElementById('game-container'), wo=document.getElementById('warning-overlay');
                    gc.classList.add('shake'); wo.style.display='flex';
                    setTimeout(()=>{
                        gc.classList.remove('shake'); wo.style.display='none';
                        enemies=[];
                        for(let i=0; i<(difficulty==='hard'?25:15); i++) {
                            let ex, ey; do { ex=5+Math.random()*90; ey=5+Math.random()*90; } while(Math.sqrt((ex-player.x)**2+(ey-player.y)**2)<12||map[Math.floor(ey)][Math.floor(ex)]===1);
                            enemies.push({x:ex,y:ey});
                        }
                        isPaused=false;
                    }, 3000);
                };
            } else if(gameState==='RETURN_GREY' && redFollowing) { location.reload(); }
        }
    }

    /** 繪製 **/
    ctx.fillStyle = (difficulty==='hard')?"#444":"#bbb"; ctx.fillRect(0,0,350,350);
    ctx.save(); ctx.translate(175-player.x*GRID_RES, 175-player.y*GRID_RES);
    ctx.fillStyle="#000";
    for(let y=Math.floor(player.y-10); y<=player.y+10; y++) {
        for(let x=Math.floor(player.x-10); x<=player.x+10; x++) {
            if(y>=0&&y<100&&x>=0&&x<100&&map[y][x]===1) ctx.fillRect(x*GRID_RES, y*GRID_RES, GRID_RES+0.5, GRID_RES+0.5);
        }
    }
    ctx.fillStyle="#888"; ctx.beginPath(); ctx.arc(greyDot.x*GRID_RES, greyDot.y*GRID_RES, 8, 0, 7); ctx.fill();
    if(gameState!=='FIND_GREY') {
        let ang=Math.atan2(player.vy, player.vx); if(player.vx===0&&player.vy===0) ang=Math.PI;
        let rx=redFollowing?player.x-Math.cos(ang)*0.6:redDot.x, ry=redFollowing?player.y-Math.sin(ang)*0.6:redDot.y;
        if(redFollowing) { ctx.strokeStyle="#000"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(player.x*GRID_RES, player.y*GRID_RES); ctx.lineTo(rx*GRID_RES, ry*GRID_RES); ctx.stroke(); }
        ctx.fillStyle="red"; ctx.beginPath(); ctx.arc(rx*GRID_RES, ry*GRID_RES, 8, 0, 7); ctx.fill();
    }
    enemies.forEach(e=>{ ctx.beginPath(); ctx.fillStyle=(difficulty==='hard')?`rgba(204,204,0,${0.4+Math.random()*0.6})`:"#cc0"; ctx.arc(e.x*GRID_RES, e.y*GRID_RES, 7, 0, 7); ctx.fill(); });
    ctx.fillStyle="#000"; ctx.beginPath(); ctx.arc(player.x*GRID_RES, player.y*GRID_RES, 10, 0, 7); ctx.fill();
    ctx.restore();
    
    requestAnimationFrame(update);
}

function endMe(m) { isGameOver=true; document.getElementById('end-msg').innerText=m; document.getElementById('end-screen').style.display='flex'; }

/** 搖桿事件 (強制重寫座標抓取) **/
const zone = document.getElementById('joystick-zone'), knob = document.getElementById('joystick-knob');
const handleMove = (e) => {
    e.preventDefault(); if(isPaused || isGameOver) return;
    const rect = zone.getBoundingClientRect();
    const t = (e.touches && e.touches[0]) ? e.touches[0] : e;
    let dx = t.clientX - (rect.left + 70), dy = t.clientY - (rect.top + 70);
    let d = Math.min(50, Math.sqrt(dx*dx+dy*dy)), a = Math.atan2(dy,dx);
    knob.style.left = (70+Math.cos(a)*d-25)+'px'; knob.style.top = (70+Math.sin(a)*d-25)+'px';
    player.vx = Math.cos(a)*(d/50); player.vy = Math.sin(a)*(d/50);
};
zone.addEventListener('touchstart', handleMove, {passive:false});
zone.addEventListener('touchmove', handleMove, {passive:false});
zone.addEventListener('touchend', () => { player.vx=0; player.vy=0; knob.style.left='45px'; knob.style.top='45px'; });
zone.addEventListener('mousedown', (e)=>{
    const mm=(me)=>handleMove(me);
    window.addEventListener('mousemove', mm);
    window.addEventListener('mouseup', ()=>{ window.removeEventListener('mousemove', mm); player.vx=0; player.vy=0; knob.style.left='45px'; knob.style.top='45px'; }, {once:true});
});
</script>
</body>
</html>
